name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Deep Clean Gradle Conflict
        run: |
          # build.gradle dosyalarındaki tüm 'repositories {' bloğunu ve içeriğini tamamen sil
          find . -name "build.gradle" -exec sed -i '/repositories {/,/}/d' {} +
          # settings.gradle'ı koruyup projeyi derlemeye zorla
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lilith-apk
          path: app/build/outputs/apk/debug/*.apk
