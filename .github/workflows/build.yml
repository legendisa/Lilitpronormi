name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK with Clean Config
        run: |
          # 1. build.gradle içindeki çakışan tüm repository tanımlarını (google, mavenCentral) temizle
          find . -name "build.gradle" -exec sed -i '/repositories {/,/}/d' {} +
          
          # 2. Gradle'ı settings.gradle üzerinden çalıştır ve projedeki bozuk ayarları bypass et
          gradle assembleDebug --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lilith-APK
          path: app/build/outputs/apk/debug/*.apk
