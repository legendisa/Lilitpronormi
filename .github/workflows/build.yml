name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Final Build Attempt
        run: |
          # 1. Tüm build dosyalarını temizle
          rm -rf app/build/
          
          # 2. İnternet üzerinden dış kütüphane çekmeyi engelle (Offline mod)
          # Eğer hata alırsan 'gradle assembleDebug --offline' yerine sadece 'gradle assembleDebug' dene
          gradle assembleDebug --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lilith-APK
        
