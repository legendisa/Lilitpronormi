name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Gradle Wrapper Installation
        run: |
          mkdir -p gradle/wrapper
          # Gradle'ı internetten zorla indirip yapılandırıyoruz
          curl -L https://services.gradle.org/distributions/gradle-8.1-bin.zip -o gradle.zip
          unzip -o gradle.zip
          mv gradle-8.1 gradle
          # gradlew dosyasını oluştur
          printf '#!/usr/bin/env sh\n./gradle/bin/gradle "$@"' > gradlew
          chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lilith-apk
          path: app/build/outputs/apk/debug/*.apk
