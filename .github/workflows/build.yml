name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean Build Files
        run: |
          # build.gradle içindeki çakışan repository tanımlarını yorum satırı yapıyoruz
          find . -name "build.gradle" -exec sed -i 's/google()/\/\/ google()/g' {} +
          find . -name "build.gradle" -exec sed -i 's/mavenCentral()/\/\/ mavenCentral()/g' {} +

      - name: Build APK with Gradle
        run: |
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lilith-apk
          path: app/build/outputs/apk/debug/*.apk
