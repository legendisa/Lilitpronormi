name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (Bypass Repository Conflict)
        run: |
          # 1. Hatalı çatışmayı gidermek için build.gradle'daki 'repositories' bloğunu tamamen geçersiz kıl
          find . -name "build.gradle" -exec sed -i '/repositories {/,/}/d' {} +
          
          # 2. İzinleri düzelt ve derlemeyi settings.gradle ile başlat
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lilith-APK
          path: app/build/outputs/apk/debug/*.apk
