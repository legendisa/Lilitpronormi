name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean and Initialize Gradle
        run: |
          # Mevcut bozuk gradle dosyalarını temizle
          rm -rf gradle/
          rm -f gradlew
          # Gradle'ı yeniden başlat
          gradle wrapper --gradle-version 8.1

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lilith-apk
          path: app/build/outputs/apk/debug/*.apk
