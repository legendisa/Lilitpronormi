name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Fix and Build
        run: |
          # 1. build.gradle dosyasındaki hatalı ayarları SİL
          find . -name "build.gradle" -exec sed -i '/repositories {/,/}/d' {} +
          
          # 2. settings.gradle dosyasını Gradle'ın tek yetkili kıl
          # Bu komutla derlemeyi 'settings.gradle' üzerinden yapmaya zorluyoruz
          gradle assembleDebug --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lilith-APK
          path: app/build/outputs/apk/debug/*.apk
