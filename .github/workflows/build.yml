name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (Pure Gradle)
        run: |
          # 1. Projeyi tertemiz bırakıyoruz, hiçbir dosyayı silmiyoruz
          # 2. Sadece sistemin kendi gradle komutunu kullanıyoruz (Wrapper yok)
          gradle assembleDebug --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lilith-APK
          path: app/build/outputs/apk/debug/*.apk
