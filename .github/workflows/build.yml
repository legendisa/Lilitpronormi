name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (Hard Reset)
        run: |
          # Mevcut tüm gradle dosyalarını sil
          rm -rf gradle/ gradlew gradlew.bat
          # Gradle wrapper olmadan, doğrudan komutla build et
          gradle assembleDebug --no-daemon --warning-mode none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lilith-apk
          path: app/build/outputs/apk/debug/*.apk
