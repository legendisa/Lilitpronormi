name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # Hatalı repository ayarlarını temizle ve build'i zorla
          find . -name "build.gradle" -exec sed -i 's/google()//g' {} +
          find . -name "build.gradle" -exec sed -i 's/mavenCentral()//g' {} +
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lilith-apk
          path: app/build/outputs/apk/debug/*.apk
