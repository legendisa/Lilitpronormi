name: Build Lilith APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject Repository Configurations
        run: |
          # Tüm build.gradle dosyalarına gerekli tüm repoları ve ayarları en üste ekle
          find . -name "build.gradle" -exec sed -i '1i buildscript { repositories { google(); mavenCentral(); maven { url "https://chaquo.com/maven" } } }' {} +

      - name: Build APK with Gradle
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lilith-apk
          path: app/build/outputs/apk/debug/*.apk
