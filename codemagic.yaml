workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Build APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/**/*.apk
